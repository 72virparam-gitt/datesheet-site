<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Even Semester Datesheets — 1st Year</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f0f5;
    --muted: #7a7a8e;
    --accent: #7c6aff;
    --accent2: #4fffb0;
    --accent3: #ff6a6a;
    --amber: #ffb347;
    --glow: rgba(124,106,255,0.18);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow blob */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(124,106,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 0 1.25rem 4rem;
  }

  /* ── HEADER ── */
  header {
    padding: 3rem 0 2.5rem;
    text-align: center;
  }
  .uni-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(124,106,255,0.1);
    border: 1px solid rgba(124,106,255,0.25);
    border-radius: 4px;
    padding: 4px 10px;
    margin-bottom: 1.2rem;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: .6rem;
  }
  header h1 span {
    color: var(--accent);
  }
  header p {
    font-size: 14px;
    color: var(--muted);
  }

  /* ── MAIN NAV TABS ── */
  .main-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border2);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 2rem;
    background: var(--surface);
  }
  .main-tab {
    flex: 1;
    padding: 14px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    transition: color .2s, background .2s;
    position: relative;
  }
  .main-tab.active {
    color: var(--text);
    background: var(--surface2);
  }
  .main-tab.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 10%; right: 10%;
    height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
  }
  .main-tab:first-child { border-right: 1px solid var(--border); }

  /* ── SECTION ── */
  .section { display: none; animation: fadeUp .3s ease; }
  .section.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── STUDENT PICKER ── */
  .student-picker {
    display: flex;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .student-btn {
    flex: 1;
    padding: 18px 20px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .student-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(124,106,255,0.08), transparent);
    opacity: 0;
    transition: opacity .2s;
  }
  .student-btn:hover::before, .student-btn.active::before { opacity: 1; }
  .student-btn.active {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .student-btn.active .s-name { color: var(--accent); }
  .s-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
    transition: color .2s;
  }
  .s-uid {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .s-dot {
    position: absolute;
    top: 12px; right: 12px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border2);
    transition: background .2s;
  }
  .student-btn.active .s-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* ── THEORY LABEL ── */
  .shared-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
    margin-bottom: 1.25rem;
    padding: 8px 14px;
    background: rgba(79,255,176,0.07);
    border: 1px solid rgba(79,255,176,0.18);
    border-radius: 8px;
  }
  .shared-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
  }

  /* ── STATS ROW ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }
  .stat-lbl {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: .03em;
  }

  /* ── CARDS ── */
  .cards { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color .2s, background .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--border2);
    background: var(--surface2);
    transform: translateY(-1px);
  }
  .card.today {
    border-color: rgba(124,106,255,0.5);
  }
  .card.today::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }

  /* Date block */
  .card-date {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 52px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 6px;
    flex-shrink: 0;
  }
  .cd-day {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }
  .cd-month {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-top: 2px;
  }
  .cd-wd {
    font-size: 9px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* Card info */
  .card-info { flex: 1; min-width: 0; }
  .card-code {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 3px;
    letter-spacing: .05em;
  }
  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-pills { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .pill {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }
  .pill-room {
    background: rgba(55,138,221,0.12);
    color: #7ab8f5;
    border: 1px solid rgba(55,138,221,0.22);
  }
  .pill-time {
    background: rgba(79,255,176,0.08);
    color: #4fffb0;
    border: 1px solid rgba(79,255,176,0.18);
  }
  .pill-venue {
    background: rgba(255,179,71,0.08);
    color: var(--amber);
    border: 1px solid rgba(255,179,71,0.2);
  }
  .pill-online {
    background: rgba(255,106,106,0.1);
    color: #ff9e9e;
    border: 1px solid rgba(255,106,106,0.22);
  }
  .pill-offline {
    background: rgba(79,255,176,0.08);
    color: #4fffb0;
    border: 1px solid rgba(79,255,176,0.15);
  }
  .today-chip {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(124,106,255,0.2);
    color: #b8acff;
    border: 1px solid rgba(124,106,255,0.35);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  /* Day group label */
  .day-group {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 0 6px;
  }
  .day-group:first-child { padding-top: 0; }

  /* ── RESPONSIVE ── */
  @media (max-width: 560px) {
    .student-picker { flex-direction: column; }
    .card-name { font-size: 13px; }
    header h1 { font-size: 26px; }
    .stats { grid-template-columns: repeat(3,1fr); gap:6px; }
    .stat-num { font-size:18px; }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="uni-tag">Chandigarh University · 2025–26</div>
    <h1>Even Semester<br><span>Date Sheets</span> — 1st Year</h1>
    <p>B.Tech · AI &amp; ML · Section BAI</p>
  </header>

  <!-- Main tabs -->
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMain('theory')">Theory</button>
    <button class="main-tab" onclick="switchMain('practical')">Practical</button>
  </div>

  <!-- ─── THEORY SECTION ─── -->
  <div id="theory" class="section active">
    <div class="shared-badge">Common datesheet for all students</div>
    <div class="stats">
      <div class="stat"><div class="stat-num">5</div><div class="stat-lbl">Exams</div></div>
      <div class="stat"><div class="stat-num">13</div><div class="stat-lbl">Days span</div></div>
      <div class="stat"><div class="stat-num">4 May</div><div class="stat-lbl">Starts</div></div>
    </div>
    <div class="cards" id="theory-cards"></div>
  </div>

  <!-- ─── PRACTICAL SECTION ─── -->
  <div id="practical" class="section">
    <div class="student-picker">
      <button class="student-btn active" onclick="switchStudent('naman')" id="btn-naman">
        <div class="s-dot"></div>
        <div class="s-name">Naman Sohal</div>
        <div class="s-uid">UID: 25BAI70141</div>
      </button>
      <button class="student-btn" onclick="switchStudent('paramvir')" id="btn-paramvir">
        <div class="s-dot"></div>
        <div class="s-name">Paramvir Pal</div>
        <div class="s-uid">UID: 25BAI70119</div>
      </button>
    </div>
    <div id="naman-prac">
      <div class="stats">
        <div class="stat"><div class="stat-num">8</div><div class="stat-lbl">Practicals</div></div>
        <div class="stat"><div class="stat-num">6</div><div class="stat-lbl">Days</div></div>
        <div class="stat"><div class="stat-num">25 Apr</div><div class="stat-lbl">Starts</div></div>
      </div>
      <div class="cards" id="naman-cards"></div>
    </div>
    <div id="paramvir-prac" style="display:none">
      <div class="stats">
        <div class="stat"><div class="stat-num">8</div><div class="stat-lbl">Practicals</div></div>
        <div class="stat"><div class="stat-num">6</div><div class="stat-lbl">Days</div></div>
        <div class="stat"><div class="stat-num">25 Apr</div><div class="stat-lbl">Starts</div></div>
      </div>
      <div class="cards" id="paramvir-cards"></div>
    </div>
  </div>

</div>

<script>
const theory = [
  {code:'25SMT-198', name:'Mathematics-II',        timing:'09:30', date:'2026-05-04', d:'04', m:'May', wd:'Mon', mode:'offline'},
  {code:'25ECH-101', name:'Digital Electronics',   timing:'09:30', date:'2026-05-06', d:'06', m:'May', wd:'Wed', mode:'offline'},
  {code:'25SZT-148', name:'Biology for Engineers', timing:'09:30', date:'2026-05-08', d:'08', m:'May', wd:'Fri', mode:'offline'},
  {code:'25CSH-103', name:'Data Structures & Algorithms', timing:'09:30', date:'2026-05-11', d:'11', m:'May', wd:'Mon', mode:'offline'},
  {code:'25GPT-121', name:'General Proficiency-1', timing:'13:30', date:'2026-05-16', d:'16', m:'May', wd:'Sat', mode:'online'},
];

const namanPrac = [
  {code:'25MEP-102', name:'Computer Graphics Lab',          room:'407',  timing:'11:00–12:30', date:'2026-04-25', d:'25', m:'Apr', wd:'Sat'},
  {code:'25ECH-101', name:'Digital Electronics',            room:'414',  timing:'1:30–3:00',   date:'2026-04-25', d:'25', m:'Apr', wd:'Sat'},
  {code:'25CSP-105', name:'Programming Practice',           room:'313',  timing:'11:00–12:30', date:'2026-04-27', d:'27', m:'Apr', wd:'Mon'},
  {code:'25TDP-151', name:'Soft Skills - I',                room:'304',  timing:'9:30–11:00',  date:'2026-04-27', d:'27', m:'Apr', wd:'Mon'},
  {code:'25ECP-102', name:'AI Applications Lab',            room:'316',  timing:'1:30–3:00',   date:'2026-04-28', d:'28', m:'Apr', wd:'Tue'},
  {code:'25PCP-111', name:'Communication Skills-II',        room:'505',  timing:'1:30–3:00',   date:'2026-04-29', d:'29', m:'Apr', wd:'Wed'},
  {code:'25CSH-103', name:'Data Structures & Algorithms',   room:'507',  timing:'3:00–4:30',   date:'2026-04-29', d:'29', m:'Apr', wd:'Wed'},
  {code:'25CSP-102', name:'Design Thinking & Innovation',   room:'416',  timing:'11:00–12:30', date:'2026-04-30', d:'30', m:'Apr', wd:'Thu'},
];

const paramvirPrac = [
  {code:'25MEP-102', name:'Computer Graphics Lab',          room:'407',  timing:'1:30–3:00',   date:'2026-04-25', d:'25', m:'Apr', wd:'Sat'},
  {code:'25CSP-102', name:'Design Thinking & Innovation',   room:'416',  timing:'11:00–12:30', date:'2026-04-27', d:'27', m:'Apr', wd:'Mon'},
  {code:'25ECH-101', name:'Digital Electronics',            room:'414',  timing:'1:30–3:00',   date:'2026-04-27', d:'27', m:'Apr', wd:'Mon'},
  {code:'25CSP-105', name:'Programming Practice',           room:'313',  timing:'9:30–11:00',  date:'2026-04-28', d:'28', m:'Apr', wd:'Tue'},
  {code:'25ECP-102', name:'AI Applications Lab',            room:'416A', timing:'1:30–3:00',   date:'2026-04-29', d:'29', m:'Apr', wd:'Wed'},
  {code:'25PCP-111', name:'Communication Skills-II',        room:'503',  timing:'11:00–12:30', date:'2026-04-29', d:'29', m:'Apr', wd:'Wed'},
  {code:'25CSH-103', name:'Data Structures & Algorithms',   room:'508',  timing:'11:00–12:30', date:'2026-04-30', d:'30', m:'Apr', wd:'Thu'},
  {code:'25TDP-151', name:'Soft Skills - I',                room:'304',  timing:'9:30–11:00',  date:'2026-04-30', d:'30', m:'Apr', wd:'Thu'},
];

const todayStr = new Date().toISOString().split('T')[0];

function groupByDate(arr) {
  const map = {};
  arr.forEach(e => {
    const k = e.date;
    if (!map[k]) map[k] = [];
    map[k].push(e);
  });
  return map;
}

function renderPrac(data, containerId) {
  const c = document.getElementById(containerId);
  const grouped = groupByDate(data);
  let html = '';
  Object.keys(grouped).sort().forEach(dateKey => {
    const items = grouped[dateKey];
    const label = items[0].wd + ', ' + items[0].d + ' ' + items[0].m + ' 2026';
    html += `<div class="day-group">${label}</div>`;
    items.forEach(e => {
      const isToday = dateKey === todayStr;
      html += `<div class="card${isToday?' today':''}">
        <div class="card-date">
          <div class="cd-day">${e.d}</div>
          <div class="cd-month">${e.m}</div>
          <div class="cd-wd">${e.wd}</div>
        </div>
        <div class="card-info">
          <div class="card-code">${e.code}</div>
          <div class="card-name">${e.name}</div>
          <div class="card-pills">
            <span class="pill pill-room">Room ${e.room}</span>
            <span class="pill pill-time">${e.timing}</span>
            ${isToday ? '<span class="today-chip">Today</span>' : ''}
          </div>
        </div>
      </div>`;
    });
  });
  c.innerHTML = html;
}

function renderTheory(data, containerId) {
  const c = document.getElementById(containerId);
  let html = '';
  data.forEach(e => {
    const isToday = e.date === todayStr;
    html += `<div class="card${isToday?' today':''}">
      <div class="card-date">
        <div class="cd-day">${e.d}</div>
        <div class="cd-month">${e.m}</div>
        <div class="cd-wd">${e.wd}</div>
      </div>
      <div class="card-info">
        <div class="card-code">${e.code}</div>
        <div class="card-name">${e.name}</div>
        <div class="card-pills">
          <span class="pill pill-time">${e.timing}</span>
          <span class="pill ${e.mode === 'online' ? 'pill-online' : 'pill-offline'}">${e.mode === 'online' ? 'Online · CBT' : 'Offline'}</span>
          ${isToday ? '<span class="today-chip">Today</span>' : ''}
        </div>
      </div>
    </div>`;
  });
  c.innerHTML = html;
}

renderTheory(theory, 'theory-cards');
renderPrac(namanPrac, 'naman-cards');
renderPrac(paramvirPrac, 'paramvir-cards');

function switchMain(tab) {
  document.querySelectorAll('.main-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'theory') || (i === 1 && tab === 'practical'));
  });
  document.getElementById('theory').classList.toggle('active', tab === 'theory');
  document.getElementById('practical').classList.toggle('active', tab === 'practical');
}

function switchStudent(s) {
  document.getElementById('btn-naman').classList.toggle('active', s === 'naman');
  document.getElementById('btn-paramvir').classList.toggle('active', s === 'paramvir');
  document.getElementById('naman-prac').style.display = s === 'naman' ? 'block' : 'none';
  document.getElementById('paramvir-prac').style.display = s === 'paramvir' ? 'block' : 'none';
}
</script>
</body>
</html>
